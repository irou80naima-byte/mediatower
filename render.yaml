# render.yaml — Render Blueprint (Infrastructure as Code)
# يُعرّف خدمتين: Frontend (Static Site) + Backend (PHP Web Service)

services:
  # ─── 1. PHP Backend ─────────────────────────────
  - type: web
    name: mediatower-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: DB_HOST
        sync: false          # ← تضعه يدوياً في Render Dashboard
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true  # ← Render ينشئه تلقائياً

  # ─── 2. React Frontend ──────────────────────────
  - type: web
    name: mediatower-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE
        sync: false          # ← URL الـ Backend بعد رفعه (مثل https://mediatower-api.onrender.com/api/index.php)
      - key: GEMINI_API_KEY
        sync: false
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
